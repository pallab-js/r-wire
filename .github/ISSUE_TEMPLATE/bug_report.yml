name: Bug Report
description: Create a report to help us improve AuraCap
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe what happened...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Explain how we can reproduce this issue.
      placeholder: |
        1. Open AuraCap
        2. Select interface 'eth0'
        3. Click 'Start'
        4. See error...
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Operating System
      placeholder: e.g. macOS Sonoma, Ubuntu 22.04, Windows 11
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Please provide any relevant logs from the terminal or console.
      render: shell
